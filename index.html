<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star sporst 1 Hindi </title>

<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.ui.min.js"></script>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/controls.css"/>

<style>
/* KEEPING YOUR ORIGINAL UI SAME */
body { margin:0; background:#000; font-family:sans-serif; color:#fff; }
header { position:fixed; top:0; width:100%; height:60px; background:#000; display:flex; align-items:center; justify-content:center; z-index:1000; }
.video-wrapper { margin-top:60px; width:100%; background:#000; }
.video-container { width:100%; aspect-ratio:16/9; background:#000; position:relative; }

/* SHAKA PLAYER */
#video { width:100%; height:100%; object-fit:contain; }
.shaka-video-container { width:100%; height:100%; }

/* popup + sidebar same */
</style>

</head>

<body>

<header>
<h2>CRICKET SUPERFANS LIVE</h2>
</header>

<div class="video-wrapper">
  <div class="video-container shaka-video-container" id="player-container">
    <video id="video" autoplay playsinline></video>
  </div>
</div>

<script>
(async function(){

const CONFIG = {
  streamUrl:"https://jiotvpllive.cdn.jio.com/bpk-tv//Star_Sports_HD1_Hindi_BTS/output/index.mpd",
  keyId:"400131994b445d8c8817202248760fda",
  key:"2d56cb6f07a75b9aff165d534ae2bfc4",
  cookieUrl:"https://allrounder-live2.pages.dev/api/cookie.json"
};

shaka.polyfill.installAll();

if (!shaka.Player.isBrowserSupported()) {
  alert("Browser not supported");
  return;
}

const video = document.getElementById("video");
const container = document.getElementById("player-container");

const player = new shaka.Player();
await player.attach(video);

const ui = new shaka.ui.Overlay(player, container, video);

ui.configure({
  controlPanelElements: [
    "play_pause",
    "mute",
    "time_and_duration",
    "spacer",
    "quality",
    "fullscreen"
  ]
});

player.configure({
  drm:{ clearKeys:{ [CONFIG.keyId]: CONFIG.key }},
  streaming:{
    lowLatencyMode:true,
    bufferingGoal:10,
    rebufferingGoal:2
  }
});

/* COOKIE SYSTEM */
let cookieValue = "";
try{
  const res = await fetch(CONFIG.cookieUrl);
  const data = await res.json();
  cookieValue = data.cookie || "";
}catch(e){}

/* HEADERS */
if(cookieValue){
  player.getNetworkingEngine().registerRequestFilter((type, request)=>{
    request.headers["Referer"]="https://www.jiotv.com/";
    request.headers["User-Agent"]="Mozilla/5.0";
    request.headers["Cookie"]=cookieValue;
  });
}

/* LOAD STREAM */
try{
  await player.load(CONFIG.streamUrl);
  video.play();
}catch(e){
  console.error("Error:", e);
}

})();
</script>

</body>
</html>
