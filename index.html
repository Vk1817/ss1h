<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> ss1h </title>
    <meta name="referrer" content="no-referrer">
    
    <!-- Shaka Player Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/controls.css"/>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        .shaka-video-container {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        /* Akcoder Branding Watermark */
        .akcoder-branding {
            position: absolute;
            z-index: 40;
            pointer-events: none;
            bottom: 20px;
            right: 20px;
            font-size: 14px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 1px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        /* Modern UI Controls Customization */
        .shaka-range-container {
            height: 4px !important;
        }

        .shaka-bottom-controls {
            padding: 0 10px 10px 10px !important;
        }
    </style>
</head>
<body>

<div class="shaka-video-container" id="player-container" data-shaka-player-container>
    <video id="video" autoplay playsinline preload="metadata" data-shaka-player></video>
    <div class="akcoder-branding">Crickcast Live</div>
</div>

<script>
    (function() {
        const CONFIG = {
            streamUrl: "https://jiotvpllive.cdn.jio.com/bpk-tv/Star_Sports_HD1_Hindi_BTS/WDVLive/index.mpd",
            keyId: "400131994b445d8c8817202248760fda",
            key: "2d56cb6f07a75b9aff165d534ae2bfc4",
            cookieUrl: "https://allrounder-live2.pages.dev/api/cookie.json"
        };

        async function initApp() {
            shaka.polyfill.installAll();

            if (!shaka.Player.isBrowserSupported()) {
                console.error('Browser not supported');
                return;
            }

            const video = document.getElementById('video');
            const container = document.getElementById('player-container');
            const player = new shaka.Player(video);

            // Configure UI
            const ui = new shaka.ui.Overlay(player, container, video);
            ui.configure({
                addBigPlayButton: true,
                controlPanelElements: ["play_pause", "mute", "volume", "time_and_duration", "spacer", "quality", "fullscreen"],
                seekBarColors: {
                    base: "rgba(255,255,255,.3)",
                    buffered: "rgba(255,255,255,.5)",
                    played: "red"
                }
            });

            // Configure DRM and Streaming settings
            player.configure({
                drm: {
                    clearKeys: {
                        [CONFIG.keyId]: CONFIG.key
                    }
                },
                streaming: {
                    lowLatencyMode: true,
                    jumpLargeGaps: true,
                    rebufferingGoal: 2
                }
            });

            // Networking Engine Filter
            player.getNetworkingEngine().registerRequestFilter(async (type, request) => {
                // Mandatory Headers for the stream
                request.headers["Referer"] = "https://www.jiotv.com/";
                request.headers["User-Agent"] = "plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";

                // Fetch cookies if not already available
                if (!window.cachedCookie) {
                    try {
                        const res = await fetch(CONFIG.cookieUrl, { cache: "no-store" });
                        const data = await res.json();
                        window.cachedCookie = data.cookie || "";
                    } catch (e) {
                        console.error("Cookie fetch failed", e);
                    }
                }

                if (window.cachedCookie) {
                    request.headers["Cookie"] = window.cachedCookie;
                    
                    // Token handling for segments
                    const token = window.cachedCookie.includes("__hdnea__=") 
                        ? window.cachedCookie.split("__hdnea__=")[1].split(";")[0] 
                        : window.cachedCookie;

                    if ((type === shaka.net.NetworkingEngine.RequestType.MANIFEST || 
                         type === shaka.net.NetworkingEngine.RequestType.SEGMENT) && 
                         !request.uris[0].includes("__hdnea__")) {
                        const sep = request.uris[0].includes("?") ? "&" : "?";
                        request.uris[0] += sep + "__hdnea__=" + token;
                    }
                }
            });

            player.addEventListener('error', (event) => console.error('Error code', event.detail.code, 'object', event.detail));

            try {
                await player.load(CONFIG.streamUrl);
                video.muted = true; // Auto-play usually requires mute
                await video.play();
            } catch (e) {
                console.error('Load failed', e);
            }
        }

        // Initialize when libraries are ready
        if (window.shaka) {
            initApp();
        } else {
            document.addEventListener('shaka-ui-loaded', initApp);
        }
    })();
</script>

</body>
</html>
