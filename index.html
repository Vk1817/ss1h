<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Star Sports 1 Hindi HD</title>
<meta name="referrer" content="no-referrer">

<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/controls.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden}

.shaka-video-container{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:#000;
}

video{
width:100%;
height:100%;
object-fit:contain;
}
</style>
</head>

<body>

<div class="shaka-video-container" id="player-container">
<video id="video" autoplay muted playsinline></video>
</div>

<script>
(async function(){

const streamUrl = "https://jiotvpllive.cdn.jio.com/bpk-tv/Star_Sports_HD1_Hindi_BTS/output/index.mpd?#__hdnea__=st=1775791321~exp=1775812921~acl=/*~hmac=af815431645c3d455e68a6e586d73021427d17f46c4326db5763ae32fe8f395d";

const keyId = "400131994b445d8c8817202248760fda";
const key = "2d56cb6f07a75b9aff165d534ae2bfc4";

const cookie = "__hdnea__=st=1775791321~exp=1775812921~acl=/*~hmac=af815431645c3d455e68a6e586d73021427d17f46c4326db5763ae32fe8f395d";

shaka.polyfill.installAll();
if (!shaka.Player.isBrowserSupported()) return;

const video = document.getElementById("video");
const container = document.getElementById("player-container");

const player = new shaka.Player();
await player.attach(video);

const ui = new shaka.ui.Overlay(player, container, video);

ui.configure({
  controlPanelElements:[
    "play_pause",
    "mute",
    "volume",
    "time_and_duration",
    "spacer",
    "quality",
    "fullscreen"
  ]
});

// DRM
player.configure({
  drm:{
    clearKeys:{
      [keyId]: key
    }
  }
});

// Apply headers (cookie + UA)
player.getNetworkingEngine().registerRequestFilter((type, request)=>{
  request.headers["Cookie"] = cookie;
  request.headers["User-Agent"] = "plaYtv/7.1.3 (Android)";
  request.headers["Referer"] = "https://www.jiotv.com/";
});

// Load stream
try{
  await player.load(streamUrl);
  video.play().catch(()=>{});
}catch(e){
  console.log("Error:", e);
}

// Auto resume
setInterval(()=>{
  if(video.paused && video.readyState > 2){
    video.play().catch(()=>{});
  }
},3000);

// Auto unmute
document.addEventListener("click", ()=>{
  video.muted = false;
},{once:true});

})();
</script>

</body>
</html>
