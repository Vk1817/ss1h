<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Star Sports 1 Hindi/title>
<meta name="referrer" content="no-referrer">

<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/controls.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif}

.shaka-video-container{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
}

video{
width:100%;
height:100%;
object-fit:contain;
background:#000;
}

.custom-watermark{
position:absolute;
top:65%;
left:6%;
font-size:11px;
color:rgba(255,255,255,0.12);
}

.block-overlay{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:#000;
}

.block-box{
padding:25px;
background:#111;
border-radius:10px;
text-align:center;
}

.block-title{color:#fff;font-size:24px}
.block-sub{color:#aaa;font-size:13px}
</style>
</head>

<body>

<div class="shaka-video-container" id="player-container">
<video id="video" autoplay muted playsinline preload="metadata"></video>
<div class="custom-watermark"></div>
</div>

<script>
(function(){

function isSandboxedEnv(){
try {
if (window.self === window.top) return false;
if (window.frameElement && window.frameElement.hasAttribute("sandbox")) return true;
return false;
} catch(e){ return true; }
}

function triggerBlockScreen(title, message){
const overlay=document.createElement("div");
overlay.className="block-overlay";
overlay.innerHTML=`<div class="block-box">
<div class="block-title">${title}</div>
<div class="block-sub">${message}</div>
</div>`;
document.body.appendChild(overlay);
}

if(isSandboxedEnv()){
triggerBlockScreen('Disable Sandbox','Open in Chrome');
return;
}

const CONFIG={
streamUrl:"https://jiotvpllive.cdn.jio.com/bpk-tv/Star_Sports_HD1_Hindi_BTS/WDVLive/index.mpd",
keyId:"400131994b445d8c8817202248760fda",
key:"2d56cb6f07a75b9aff165d534ae2bfc4",
cookieUrl:"https://allrounder-live2.pages.dev/api/cookie.json"
};

document.addEventListener("DOMContentLoaded",async()=>{

shaka.polyfill.installAll();
if(!shaka.Player.isBrowserSupported()) return;

const video=document.getElementById("video");
const container=document.getElementById("player-container");

const player=new shaka.Player();
await player.attach(video);

new shaka.ui.Overlay(player,container,video);

player.configure({
drm:{clearKeys:{[CONFIG.keyId]:CONFIG.key}},
streaming:{lowLatencyMode:true}
});

let cookieValue="";
try{
const res=await fetch(CONFIG.cookieUrl);
const data=await res.json();
cookieValue=data.cookie||"";
}catch(e){}

if(cookieValue){
player.getNetworkingEngine().registerRequestFilter((type,request)=>{
request.headers["Referer"]="https://www.jiotv.com/";
request.headers["User-Agent"]="ExoPlayer";
request.headers["Cookie"]=cookieValue;
});
}

try{
await player.load(CONFIG.streamUrl);
video.play();
}catch(e){}

video.addEventListener("play",()=>video.muted=false);

});
})();
</script>

</body>
</html>
