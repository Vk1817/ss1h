<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Sports HD1 Hindi</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden}
.shaka-video-container{position:absolute;inset:0}
video{width:100%;height:100%;object-fit:contain;background:#000}
</style>
</head>

<body>

<div class="shaka-video-container" data-shaka-player>
  <video autoplay playsinline></video>
</div>

<script>
document.addEventListener('DOMContentLoaded', async () => {

  shaka.polyfill.installAll();

  if (!shaka.Player.isBrowserSupported()) {
    alert("Browser not supported");
    return;
  }

  const video = document.querySelector('video');
  const player = new shaka.Player();
  await player.attach(video);

  const container = document.querySelector('.shaka-video-container');
  const ui = new shaka.ui.Overlay(player, container, video);

  // UI
  ui.configure({
    controlPanelElements: [
      'play_pause','time_and_duration','mute','volume',
      'spacer','quality','fullscreen'
    ]
  });

  // 🔑 DRM ClearKey
  player.configure({
    drm: {
      clearKeys: {
        "400131994b445d8c8817202248760fda":
        "2d56cb6f07a75b9aff165d534ae2bfc4"
      }
    }
  });

  // 🍪 Cookie + Headers
  const cookie = "__hdnea__=st=1775887422~exp=1775909022~acl=/*~hmac=f5129d6248aa9d2e55f100f073113c2835a5d07b306be5010ca35c6f0e7c0af0";

  player.getNetworkingEngine().registerRequestFilter((type, request) => {
    request.headers['User-Agent'] = "plaYtv/7.1.3 (Linux;Android 13)";
    request.headers['Cookie'] = cookie;
    request.headers['Referer'] = "https://www.jiotv.com/";
  });

  // 🎥 MPD URL
  const streamUrl = "https://jiotvpllive.cdn.jio.com/bpk-tv/Star_Sports_HD1_Hindi_BTS/output/index.mpd";

  try {
    await player.load(streamUrl);
    video.play();
    console.log("Stream loaded");
  } catch (e) {
    console.error("Error:", e);
  }

});
</script>

</body>
</html>
