<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Star Sports 1 Hindi HD</title>
<meta name="referrer" content="no-referrer">

<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/controls.css"/>

<!-- Google tag -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-FMP9REY96D"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-FMP9REY96D');
</script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:sans-serif}

.shaka-video-container{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:#000;
}

video{
width:100%;
height:100%;
object-fit:contain;
background:#000;
}
</style>
</head>

<body>

<div class="shaka-video-container" id="player-container">
<video id="video" autoplay muted playsinline preload="metadata"></video>
</div>

<script>
(async function(){

const CONFIG = {
  streamUrl: "https://jiotvpllive.cdn.jio.com/bpk-tv/Star_Sports_HD1_Hindi_BTS/output/index.mpd",
  keyId: "400131994b445d8c8817202248760fda",
  key: "2d56cb6f07a75b9aff165d534ae2bfc4",
  cookieUrl: "https://raw.githubusercontent.com/Shubhamkur/Tv/main/api2"
};

shaka.polyfill.installAll();
if (!shaka.Player.isBrowserSupported()) return;

const video = document.getElementById("video");
const container = document.getElementById("player-container");

video.muted = true;

const player = new shaka.Player();
await player.attach(video);

const ui = new shaka.ui.Overlay(player, container, video);

ui.configure({
  addBigPlayButton: true,
  controlPanelElements: [
    "mute",
    "play_pause",
    "time_and_duration",
    "spacer",
    "quality",
    "picture_in_picture",
    "fullscreen"
  ]
});

player.configure({
  drm: {
    clearKeys: {
      [CONFIG.keyId]: CONFIG.key
    }
  },
  streaming: {
    lowLatencyMode: true,
    bufferingGoal: 10,
    rebufferingGoal: 2
  }
});

// 🔥 Fetch cookie from GitHub RAW
let cookieValue = "";

try {
  const res = await fetch(CONFIG.cookieUrl);
  const text = await res.text();
  cookieValue = text.trim();
} catch(e) {
  console.log("Cookie fetch error", e);
}

// Apply cookie to requests
if (cookieValue) {
  player.getNetworkingEngine().registerRequestFilter((type, request) => {
    request.headers["Referer"] = "https://www.jiotv.com/";
    request.headers["User-Agent"] = "plaYtv/7.1.5 (Android)";
    request.headers["Cookie"] = cookieValue;

    let token = cookieValue.replace("__hdnea__=", "");

    if (
      (type === shaka.net.NetworkingEngine.RequestType.MANIFEST ||
       type === shaka.net.NetworkingEngine.RequestType.SEGMENT) &&
      !request.uris[0].includes("__hdnea__")
    ) {
      const sep = request.uris[0].includes("?") ? "&" : "?";
      request.uris[0] += sep + "__hdnea__=" + token;
    }
  });
}

// Load stream
try {
  await player.load(CONFIG.streamUrl);
  video.play().catch(()=>{});
} catch(e) {
  console.log("Stream error", e);
}

// Auto resume
setInterval(()=>{
  if(video.paused && video.readyState > 2){
    video.play().catch(()=>{});
  }
},3000);

// Auto unmute on click
document.addEventListener("click", ()=>{
  video.muted = false;
},{once:true});

})();
</script>

</body>
</html>
