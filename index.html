<!DOCTYPE html>

<head>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif}

.shaka-video-container{
position:fixed;
inset:0;
background:#000;
display:flex;
align-items:center;
justify-content:center;
}

video{
width:100%;
height:100%;
object-fit:contain;
background:#000;
}

.custom-watermark{
position:absolute;
z-index:40;
pointer-events:none;
top:65%;
left:6%;
transform:translateY(-50%);
font-size:11px;
font-weight:600;
color:rgba(255,255,255,0.12);
}
</style>
</head>

<body>

<div class="shaka-video-container" id="player-container">
<video id="video" autoplay muted playsinline preload="metadata"></video>
<div class="custom-watermark"></div>
</div>

<script>
(function(){

  const CONFIG={
    streamUrl:"https://jiotvbpkmob.cdn.jio.com/bpk-tv/Star_Sports_HD1_Hindi_BTS/output/index.mpd?__hdnea__=st=1772474432~exp=1772560832~acl=/*~hmac=d0ee1cf6207599dec3372119d5e17142d901727196ebf9bb6d0c280732e7c654&xxx=%7Ccookie=__hdnea__=st=1772156573~exp=1772242973~acl=/*~hmac=1725105ede283b60fda01febecd596b35c2a60b3239000322bb6f31fe30f32b7",
    keyId:"400131994b445d8c8817202248760fda",
    key:"2d56cb6f07a75b9aff165d534ae2bfc4"
  };

  document.addEventListener("DOMContentLoaded",async()=>{

    shaka.polyfill.installAll();
    if(!shaka.Player.isBrowserSupported()) return;

    const video=document.getElementById("video");
    const container=document.getElementById("player-container");

    video.muted=true;

    const player=new shaka.Player();
    await player.attach(video);

    const ui=new shaka.ui.Overlay(player,container,video);

    ui.configure({
      addBigPlayButton:true,
      controlPanelElements:[
        "mute","play_pause","time_and_duration","spacer","quality","fullscreen"
      ]
    });

    player.configure({
      drm:{clearKeys:{[CONFIG.keyId]:CONFIG.key}},
      streaming:{lowLatencyMode:true}
    });

    try{
      await player.load(CONFIG.streamUrl);
      video.play().catch(()=>{});
    }catch(e){}

    video.addEventListener("play",()=>{
      video.muted=false;
    });

  });

})();
</script>

</body>
</html>
