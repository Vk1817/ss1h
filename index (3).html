<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Sports 1 Hindi HD - Engine</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.min.css">
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; }
        #videoContainer { width: 100%; height: 100%; }
        video { width: 100%; height: 100%; }
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-family: sans-serif; z-index: 10;
        }
    </style>
</head>
<body>

    <div id="loading">Loading Stream...</div>
    <div id="videoContainer">
        <video id="videoPlayer" autoplay playsinline></video>
    </div>

    <script>
        const API_URL = "https://tv1.akcoder777.workers.dev";
        let player = null;

        async function startStreaming() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();

                // 1. Filter specifically for Star Sports 1 Hindi
                const channel = data.find(ch => 
                    ch.channel_name.includes("Star Sports 1 Hindi") && !ch.channel_name.includes("Select")
                );

                if (!channel) {
                    document.getElementById('loading').innerText = "Channel Offline";
                    return;
                }

                // 2. Setup Shaka
                shaka.polyfill.installAll();
                const video = document.getElementById('videoPlayer');
                const container = document.getElementById('videoContainer');
                
                player = new shaka.Player(video);
                new shaka.ui.Overlay(player, container, video);

                // 3. DRM Configuration
                player.configure({
                    drm: { clearKeys: { [channel.keyId]: channel.key } },
                    streaming: { lowLatencyMode: true }
                });

                // 4. Network Filters (The Code 2 Method)
                player.getNetworkingEngine().registerRequestFilter((type, request) => {
                    request.headers["Referer"] = "https://www.jiotv.com/";
                    request.headers["User-Agent"] = "plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";

                    if (channel.cookie) {
                        request.headers["Cookie"] = channel.cookie;
                        // Handle segment tokens
                        if (type === shaka.net.NetworkingEngine.RequestType.SEGMENT || type === shaka.net.NetworkingEngine.RequestType.MANIFEST) {
                            if (!request.uris[0].includes("__hdnea__")) {
                                const sep = request.uris[0].includes("?") ? "&" : "?";
                                request.uris[0] += sep + channel.cookie;
                            }
                        }
                    }
                });

                await player.load(channel.channel_url);
                document.getElementById('loading').style.display = 'none';

            } catch (e) {
                console.error(e);
                document.getElementById('loading').innerText = "Error Loading Stream";
            }
        }

        window.onload = startStreaming;
    </script>
</body>
</html>
